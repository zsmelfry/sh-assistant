services:
  - type: web
    name: sh-assistant
    runtime: docker
    dockerfilePath: ./deployment/Dockerfile
    dockerContext: .
    region: frankfurt
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "3000"
      # 首次部署时填写，创建完用户后可删除
      - key: SEED_USERNAME
        sync: false
      - key: SEED_PASSWORD
        sync: false
      # 必填：JWT 签名密钥（Dashboard 手动填，openssl rand -base64 32）
      - key: JWT_SECRET
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
